<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>28-Day Chair Tai Chi — Daily Workout</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Display:ital,wght@0,300;0,600;1,300&family=Noto+Sans:wght@300;400;600;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:        #1a1a2e;
  --stone:      #5a5a6a;
  --sage:       #5a7a5a;
  --sage-bg:    #e8f0e8;
  --rice:       #f5f0e8;
  --warm-white: #faf8f3;
  --gold:       #b8922a;
  --gold-light: #f0dfa0;
  --terracotta: #a05040;
  --mist:       #dde4e8;
  --rest-bg:    #eef2f5;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Noto Sans', sans-serif;
  background: #2a2a3a;
  color: var(--ink);
}

/* ── NAV BAR ── */
#navbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 200;
  background: var(--ink);
  color: #fff;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
}

#navbar .nav-title {
  font-family: 'Noto Serif Display', serif;
  font-style: italic;
  font-size: 15px;
  color: rgba(255,255,255,0.7);
  flex: 1;
}

#navbar .nav-day-label {
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gold-light);
  font-weight: 600;
}

.nav-btn {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
  padding: 6px 16px;
  border-radius: 3px;
  cursor: pointer;
  font-family: 'Noto Sans', sans-serif;
  font-size: 13px;
  letter-spacing: 1px;
  transition: background 0.15s;
}
.nav-btn:hover { background: rgba(255,255,255,0.22); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }

#day-counter {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  min-width: 60px;
  text-align: center;
}

/* ── PROGRESS BAR ── */
#progress-bar-wrap {
  position: fixed;
  top: 48px; left: 0; right: 0;
  height: 4px;
  background: rgba(255,255,255,0.1);
  z-index: 199;
}
#progress-bar {
  height: 100%;
  background: var(--gold-light);
  transition: width 0.4s ease;
  width: 0%;
}

/* ── PAGES CONTAINER ── */
#pages {
  padding-top: 56px;
}

/* ── SINGLE DAY PAGE ── */
.day-page {
  display: none;
  min-height: calc(100vh - 56px);
  padding: 32px 24px 40px;
  max-width: 780px;
  margin: 0 auto;
}
.day-page.active { display: flex; flex-direction: column; gap: 20px; }

/* ── DAY HEADER ── */
.day-header {
  display: flex;
  align-items: flex-start;
  gap: 20px;
  padding-bottom: 20px;
  border-bottom: 2px solid rgba(255,255,255,0.15);
}

.day-number-block {
  background: var(--gold);
  color: #fff;
  border-radius: 6px;
  padding: 10px 18px;
  text-align: center;
  min-width: 80px;
  flex-shrink: 0;
}
.day-number-block .dn-label {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  opacity: 0.8;
}
.day-number-block .dn-num {
  font-family: 'Noto Serif Display', serif;
  font-size: 52px;
  font-weight: 300;
  line-height: 1;
}

.day-meta { flex: 1; }
.day-meta .week-badge {
  display: inline-block;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--sage);
  background: var(--sage-bg);
  border-radius: 3px;
  padding: 3px 10px;
  margin-bottom: 6px;
  font-weight: 600;
}
.day-meta h2 {
  font-family: 'Noto Serif Display', serif;
  font-weight: 300;
  font-size: 28px;
  color: var(--warm-white);
  line-height: 1.2;
}
.day-meta .day-focus {
  font-size: 13px;
  color: rgba(255,255,255,0.45);
  margin-top: 4px;
  font-style: italic;
}

.day-kanji {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 64px;
  color: rgba(255,255,255,0.08);
  line-height: 1;
  flex-shrink: 0;
}

/* ── REST DAY ── */
.rest-page {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 16px;
  padding: 40px;
  background: rgba(255,255,255,0.04);
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
}
.rest-page .rest-kanji {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 120px;
  color: rgba(255,255,255,0.15);
  line-height: 1;
}
.rest-page h3 {
  font-family: 'Noto Serif Display', serif;
  font-size: 32px;
  font-weight: 300;
  color: rgba(255,255,255,0.6);
}
.rest-page p {
  max-width: 420px;
  font-size: 15px;
  line-height: 1.7;
  color: rgba(255,255,255,0.35);
}

/* ── EXERCISE LIST ── */
.exercises-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex: 1;
}

.ex-row {
  display: flex;
  align-items: center;
  gap: 16px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  padding: 16px 20px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  position: relative;
}
.ex-row:hover { background: rgba(255,255,255,0.1); }
.ex-row.done {
  background: rgba(90,122,90,0.25);
  border-color: rgba(90,122,90,0.5);
}

.ex-check {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.3);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all 0.15s;
  color: transparent;
}
.ex-row.done .ex-check {
  border-color: var(--sage);
  background: var(--sage);
  color: #fff;
}

.ex-body { flex: 1; }

.ex-name {
  font-family: 'Noto Serif Display', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--warm-white);
  line-height: 1.2;
}
.ex-row.done .ex-name {
  text-decoration: line-through;
  opacity: 0.5;
}

.ex-desc {
  font-size: 13px;
  color: rgba(255,255,255,0.45);
  margin-top: 3px;
  line-height: 1.5;
}

.ex-duration {
  font-family: 'Noto Serif Display', serif;
  font-size: 22px;
  font-weight: 300;
  color: var(--gold-light);
  flex-shrink: 0;
  text-align: right;
  min-width: 70px;
}
.ex-row.done .ex-duration { opacity: 0.3; }

.ex-badge {
  position: absolute;
  top: 8px; right: 8px;
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--sage);
  background: var(--sage-bg);
  border-radius: 2px;
  padding: 2px 6px;
  font-weight: 600;
}

/* ── COMPLETION BANNER ── */
.completion-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(90,122,90,0.2);
  border: 1px solid rgba(90,122,90,0.4);
  border-radius: 8px;
  padding: 14px 20px;
  opacity: 0;
  transition: opacity 0.4s;
}
.completion-bar.visible { opacity: 1; }
.completion-bar .cb-icon { font-size: 24px; }
.completion-bar .cb-text {
  flex: 1;
  font-family: 'Noto Serif Display', serif;
  font-style: italic;
  font-size: 16px;
  color: var(--sage-bg);
}
.completion-bar .cb-next {
  background: var(--sage);
  color: #fff;
  border: none;
  padding: 8px 20px;
  border-radius: 4px;
  cursor: pointer;
  font-family: 'Noto Sans', sans-serif;
  font-size: 12px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  transition: background 0.15s;
}
.completion-bar .cb-next:hover { background: #4a6a4a; }

/* ── WEEK DOTS STRIP ── */
.week-strip {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
  padding: 12px 0 0;
}
.w-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  cursor: pointer;
  transition: background 0.15s, transform 0.15s;
  position: relative;
}
.w-dot:hover { transform: scale(1.4); }
.w-dot.current { background: var(--gold-light); transform: scale(1.3); }
.w-dot.completed { background: var(--sage); }
.w-dot.rest-dot { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); }

/* ── PRINT BUTTON ── */
#print-btn {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.6);
  border: 1px solid rgba(255,255,255,0.2);
  padding: 10px 18px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  transition: all 0.2s;
  z-index: 100;
}
#print-btn:hover { background: rgba(255,255,255,0.18); color: #fff; }

/* ── PRINT STYLES ── */
@media print {
  body { background: #fff; }
  #navbar, #progress-bar-wrap, #print-btn, .week-strip, .completion-bar, #day-nav-bottom { display: none !important; }
  #pages { padding-top: 0; }
  .day-page { display: flex !important; min-height: 100vh; page-break-after: always; background: #fff; padding: 32px; }
  .day-header { border-color: #ccc; }
  .day-number-block { background: #333; }
  .day-meta h2 { color: #111; }
  .day-meta .day-focus { color: #666; }
  .day-kanji { color: #eee; }
  .ex-row { background: #f9f9f9; border-color: #ddd; break-inside: avoid; }
  .ex-row.done { background: #f0f5f0; }
  .ex-name { color: #111; font-size: 20px; }
  .ex-desc { color: #666; }
  .ex-duration { color: #555; }
  .rest-page { background: #f5f5f5; border-color: #ddd; }
  .rest-page h3 { color: #555; }
  .rest-page p { color: #888; }
  .rest-page .rest-kanji { color: #ddd; }
  .week-badge { background: #eee; color: #555; }
}
</style>
</head>
<body>

<!-- NAV BAR -->
<div id="navbar">
  <button class="nav-btn" id="btn-prev" onclick="goDay(-1)" disabled>← Prev</button>
  <span id="day-counter">Day 1 / 28</span>
  <button class="nav-btn" id="btn-next" onclick="goDay(1)">Next →</button>
  <span class="nav-day-label" id="nav-day-name"></span>
  <span class="nav-title">Chair Tai Chi · 28-Day Plan</span>
</div>
<div id="progress-bar-wrap"><div id="progress-bar"></div></div>

<!-- PAGES -->
<div id="pages"></div>

<!-- WEEK DOTS -->
<div class="week-strip" id="week-strip"></div>

<!-- PRINT BUTTON -->
<button id="print-btn" onclick="window.print()">🖨 Print All</button>

<script>
// ── DATA ──────────────────────────────────────────────────────────────
const EXERCISES = {
  march:      { name: "Seated March",        badge: "Warm-Up",  desc: "Lift alternating knees slowly, as if walking in place. Keep spine tall, arms swing gently opposite." },
  neckroll:   { name: "Neck Rolls",           badge: "Warm-Up",  desc: "Drop chin to chest, slowly roll right ear toward right shoulder, back to center, then left. Never roll fully backward." },
  armcircle:  { name: "Arm Circles",          badge: "Warm-Up",  desc: "Arms at shoulder height — slow circles forward 10×, then backward 10×. Breathe continuously." },
  ankleroll:  { name: "Ankle Rolls",          badge: "Warm-Up",  desc: "Lift one foot, rotate the ankle 5× clockwise, 5× counter-clockwise. Repeat other side." },
  cloud:      { name: "Cloud Hands",          badge: "Tai Chi",  desc: "Sweep both hands slowly from left to right as if moving clouds. Torso rotates gently, elbows soft." },
  wardoff:    { name: "Ward Off (Peng)",      badge: "Tai Chi",  desc: "Hold arms rounded as if embracing a large ball. Push outward with one forearm while the other curves below." },
  wildmane:   { name: "Parting Wild Horse's Mane", badge: "Tai Chi", desc: "One hand rises to shoulder height (palm down), opposite hand descends to hip (palm up). Alternate sides." },
  brushknee:  { name: "Brush Knee",           badge: "Tai Chi",  desc: "One hand sweeps low past the opposite knee while the other pushes forward at chest height. Flow continuously." },
  repulse:    { name: "Repulse the Monkey",   badge: "Tai Chi",  desc: "Draw one hand back to the ear while the opposite reaches forward, palm out. Alternate sides." },
  waveclouds: { name: "Wave Hands in Clouds", badge: "Tai Chi",  desc: "Like Cloud Hands but with more torso rotation and a gentle figure-8 path. Hands always move in opposition." },
  leglift:    { name: "Seated Leg Lifts",     badge: "Strength", desc: "Slowly straighten one knee until parallel to floor, hold 3 sec, lower. 10 reps each side." },
  marchw:     { name: "Seated March (Slow)",  badge: "Strength", desc: "Lift each knee and hold at height for 2 seconds before lowering. Increases core engagement." },
  shrug:      { name: "Shoulder Shrugs",      badge: "Strength", desc: "Inhale and draw shoulders up to ears; exhale and let them drop completely. Feel the full contrast." },
  chestopen:  { name: "Chest Opener",         badge: "Strength", desc: "Fingers interlaced behind head, open elbows wide, inhale and lift the chest. Hold 3 sec, release." },
  goddess:    { name: "Goddess Squat",        badge: "Strength", desc: "Sit at chair edge, feet wide. Slowly rise to a partial stand (hover), lower with control. Progress to full stand Week 3+." },
  row:        { name: "Seated Row",           badge: "Strength", desc: "Arms extended forward, draw both elbows back squeezing shoulder blades together. Hold 2 sec, return slowly." },
  singleleg:  { name: "Single Leg Hold",      badge: "Balance",  desc: "Hands lightly on thighs, lift one foot 2–3 inches off floor and hold still. Breathe. Repeat other side." },
  toetap:     { name: "Toe Taps",             badge: "Balance",  desc: "Alternately tap each toe forward, then out to the side, then back to center. Slow and controlled." },
  fold:       { name: "Forward Fold",         badge: "Stretch",  desc: "Sit at edge, hinge at hips and let the torso drape toward thighs. Breathe deeply into the lower back." },
  catcow:     { name: "Cat-Cow Stretch",      badge: "Stretch",  desc: "Hands on knees. Inhale: arch back, lift chest (cow). Exhale: round spine, drop chin (cat). Flow continuously." },
  eagle:      { name: "Eagle Arms",           badge: "Stretch",  desc: "Cross one arm under the other at the elbows, wrap forearms, lift to shoulder height. Upper back opens." },
  twist:      { name: "Seated Twist",         badge: "Stretch",  desc: "Hand on opposite knee, other hand behind on seat. Inhale tall, exhale and rotate. Look over the shoulder." },
  hipopen:    { name: "Hip Opener",           badge: "Stretch",  desc: "Ankle over opposite knee (figure-4). Sit tall and lean gently forward from hips. Feel the outer hip/glute." },
  hamstring:  { name: "Hamstring Stretch",    badge: "Stretch",  desc: "Extend one leg straight, flex foot, reach toward toes with a long spine. Do not round the back." },
  warrior:    { name: "Warrior I (Seated)",   badge: "Advanced", desc: "Sit sideways on chair edge, rear leg extended back (foot flat), front knee at 90°. Arms sweep overhead." },
  pigeon:     { name: "Pigeon Pose (Seated)", badge: "Advanced", desc: "Ankle over opposite knee, foot flexed to protect the knee. Sit tall or gently lean forward. Deep hip stretch." },
  gatherqi:   { name: "Gathering Qi",         badge: "Closing",  desc: "Arms wide at sides, slowly sweep hands inward to the belly as if gathering energy. Traditional Tai Chi closing." },
  savasana:   { name: "Seated Savasana",      badge: "Closing",  desc: "Hands in lap, eyes closed, breathe naturally. Notice any warmth or stillness in the body. The most important move." },
};

function ex(key, dur) { return { key, dur }; }

const DAYS = [
  // Week 1 — Rooting
  { week:1, theme:"Rooting", focus:"Building awareness in the body", exercises:[
    ex("march","20 sec"), ex("armcircle","10 reps"), ex("ankleroll","5× each"), ex("neckroll","30 sec"), ex("gatherqi","5 sweeps"), ex("savasana","1 min")
  ]},
  { week:1, theme:"Rooting", focus:"Spine and shoulder release", exercises:[
    ex("march","20 sec"), ex("shrug","10 reps"), ex("catcow","30 sec"), ex("cloud","30 sec"), ex("gatherqi","5 sweeps"), ex("savasana","1 min")
  ]},
  { week:1, theme:"Rooting", focus:"Leg strength and foot connection", exercises:[
    ex("neckroll","30 sec"), ex("armcircle","10 reps"), ex("leglift","8× each"), ex("toetap","20 sec"), ex("fold","30 sec"), ex("savasana","1 min")
  ]},
  { week:1, theme:"Rooting", focus:"Rest — let the body integrate", rest:true },
  { week:1, theme:"Rooting", focus:"First Tai Chi form movements", exercises:[
    ex("march","20 sec"), ex("wardoff","30 sec ea"), ex("chestopen","8 reps"), ex("cloud","40 sec"), ex("gatherqi","5 sweeps"), ex("savasana","1 min")
  ]},
  { week:1, theme:"Rooting", focus:"Torso rotation and upper back", exercises:[
    ex("armcircle","10 reps"), ex("twist","20 sec ea"), ex("shrug","10 reps"), ex("brushknee","30 sec"), ex("fold","30 sec"), ex("savasana","1 min")
  ]},
  { week:1, theme:"Rooting", focus:"Rest — you earned it", rest:true },

  // Week 2 — Flowing
  { week:2, theme:"Flowing", focus:"Linking breath to movement", exercises:[
    ex("march","30 sec"), ex("cloud","40 sec"), ex("goddess","10 reps"), ex("hipopen","30 sec ea"), ex("gatherqi","6 sweeps"), ex("savasana","1 min")
  ]},
  { week:2, theme:"Flowing", focus:"Rest — active recovery", rest:true },
  { week:2, theme:"Flowing", focus:"Back strength and flow", exercises:[
    ex("neckroll","30 sec"), ex("wildmane","30 sec"), ex("row","10 reps"), ex("catcow","40 sec"), ex("eagle","20 sec ea"), ex("savasana","1 min")
  ]},
  { week:2, theme:"Flowing", focus:"Balance and leg control", exercises:[
    ex("armcircle","10 reps"), ex("repulse","30 sec"), ex("leglift","10× each"), ex("singleleg","10 sec ea"), ex("fold","40 sec"), ex("savasana","1 min")
  ]},
  { week:2, theme:"Flowing", focus:"Rest", rest:true },
  { week:2, theme:"Flowing", focus:"Full upper body flow", exercises:[
    ex("march","30 sec"), ex("waveclouds","40 sec"), ex("brushknee","40 sec"), ex("chestopen","10 reps"), ex("twist","25 sec ea"), ex("gatherqi","6 sweeps"), ex("savasana","1 min")
  ]},
  { week:2, theme:"Flowing", focus:"Rest — notice your progress", rest:true },

  // Week 3 — Expanding
  { week:3, theme:"Expanding", focus:"Deeper reach in every direction", exercises:[
    ex("march","30 sec"), ex("cloud","45 sec"), ex("wardoff","40 sec ea"), ex("goddess","12 reps"), ex("hipopen","40 sec ea"), ex("gatherqi","8 sweeps"), ex("savasana","2 min")
  ]},
  { week:3, theme:"Expanding", focus:"Rest", rest:true },
  { week:3, theme:"Expanding", focus:"Warrior postures introduced", exercises:[
    ex("neckroll","30 sec"), ex("toetap","20 sec ea"), ex("warrior","25 sec ea"), ex("repulse","45 sec"), ex("eagle","25 sec ea"), ex("savasana","2 min")
  ]},
  { week:3, theme:"Expanding", focus:"Flow and deep hip work", exercises:[
    ex("armcircle","12 reps"), ex("waveclouds","45 sec"), ex("row","12 reps"), ex("pigeon","35 sec ea"), ex("catcow","45 sec"), ex("gatherqi","8 sweeps"), ex("savasana","2 min")
  ]},
  { week:3, theme:"Expanding", focus:"Balance and hamstrings", exercises:[
    ex("march","35 sec"), ex("wildmane","40 sec"), ex("singleleg","15 sec ea"), ex("hamstring","30 sec ea"), ex("brushknee","45 sec"), ex("savasana","2 min")
  ]},
  { week:3, theme:"Expanding", focus:"Rest", rest:true },
  { week:3, theme:"Expanding", focus:"Strength and hip mobility", exercises:[
    ex("neckroll","30 sec"), ex("cloud","50 sec"), ex("goddess","12 reps"), ex("chestopen","10 reps"), ex("hipopen","40 sec ea"), ex("gatherqi","8 sweeps"), ex("savasana","2 min")
  ]},

  // Week 4 — Integrating
  { week:4, theme:"Integrating", focus:"The movements become one", exercises:[
    ex("march","40 sec"), ex("wardoff","45 sec ea"), ex("waveclouds","50 sec"), ex("warrior","30 sec ea"), ex("pigeon","40 sec ea"), ex("gatherqi","10 sweeps"), ex("savasana","2 min")
  ]},
  { week:4, theme:"Integrating", focus:"Back, hamstrings, and flow", exercises:[
    ex("armcircle","12 reps"), ex("wildmane","45 sec"), ex("row","12 reps"), ex("hamstring","35 sec ea"), ex("twist","30 sec ea"), ex("savasana","2 min")
  ]},
  { week:4, theme:"Integrating", focus:"Balance and deep hip opening", exercises:[
    ex("neckroll","30 sec"), ex("repulse","50 sec"), ex("goddess","15 reps"), ex("singleleg","20 sec ea"), ex("eagle","25 sec ea"), ex("hipopen","40 sec ea"), ex("gatherqi","10 sweeps"), ex("savasana","2 min")
  ]},
  { week:4, theme:"Integrating", focus:"The full flowing sequence", exercises:[
    ex("march","40 sec"), ex("cloud","50 sec"), ex("brushknee","50 sec"), ex("waveclouds","50 sec"), ex("fold","40 sec"), ex("gatherqi","10 sweeps"), ex("savasana","2 min")
  ]},
  { week:4, theme:"Integrating", focus:"Rest", rest:true },
  { week:4, theme:"Integrating", focus:"Warrior and deep stretch", exercises:[
    ex("armcircle","12 reps"), ex("warrior","35 sec ea"), ex("wildmane","50 sec"), ex("pigeon","40 sec ea"), ex("catcow","50 sec"), ex("chestopen","12 reps"), ex("gatherqi","10 sweeps"), ex("savasana","2 min")
  ]},
  { week:4, theme:"Integrating", focus:"Completion — rest and reflect", rest:true, complete:true },
];

const WEEK_KANJIS = ["", "根", "流", "展", "合"];
const WEEK_NAMES  = ["", "Rooting", "Flowing", "Expanding", "Integrating"];

// ── STATE ──────────────────────────────────────────────────────────────
let currentDay = 0;
const checked = JSON.parse(localStorage.getItem("taichi_checked") || "{}");

// ── BUILD PAGES ────────────────────────────────────────────────────────
function buildPages() {
  const container = document.getElementById("pages");
  const strip = document.getElementById("week-strip");

  DAYS.forEach((day, i) => {
    const dayNum = i + 1;
    const page = document.createElement("div");
    page.className = "day-page";
    page.id = `day-${i}`;

    if (day.rest) {
      const isComplete = day.complete;
      page.innerHTML = `
        <div class="day-header">
          <div class="day-number-block">
            <div class="dn-label">Day</div>
            <div class="dn-num">${dayNum}</div>
          </div>
          <div class="day-meta">
            <span class="week-badge">Week ${day.week} · ${WEEK_NAMES[day.week]}</span>
            <h2>${isComplete ? "You Did It." : "Rest Day"}</h2>
            <div class="day-focus">${day.focus}</div>
          </div>
          <div class="day-kanji">${WEEK_KANJIS[day.week]}</div>
        </div>
        <div class="rest-page">
          <div class="rest-kanji">${isComplete ? "成" : "休"}</div>
          <h3>${isComplete ? "28 Days Complete" : "Rest & Recover"}</h3>
          <p>${isComplete
            ? "You have completed the full 28-day Chair Tai Chi program. Your body has changed — not just in flexibility and strength, but in its relationship with stillness. Begin again whenever you're ready. The second round will feel entirely different."
            : "Rest days are part of the practice, not gaps in it. Notice how your body feels today. Light walking is welcome. Stillness is the point."
          }</p>
        </div>`;
    } else {
      const exRows = day.exercises.map((e, ei) => {
        const info = EXERCISES[e.key];
        const doneKey = `${i}-${ei}`;
        const isDone = checked[doneKey];
        return `
          <div class="ex-row ${isDone ? 'done' : ''}" onclick="toggleEx(${i},${ei},this)">
            <div class="ex-check">${isDone ? '✓' : ''}</div>
            <div class="ex-body">
              <div class="ex-name">${info.name}</div>
              <div class="ex-desc">${info.desc}</div>
            </div>
            <div class="ex-duration">${e.dur}</div>
            <div class="ex-badge">${info.badge}</div>
          </div>`;
      }).join("");

      const allDone = day.exercises.every((_,ei) => checked[`${i}-${ei}`]);

      page.innerHTML = `
        <div class="day-header">
          <div class="day-number-block">
            <div class="dn-label">Day</div>
            <div class="dn-num">${dayNum}</div>
          </div>
          <div class="day-meta">
            <span class="week-badge">Week ${day.week} · ${WEEK_NAMES[day.week]}</span>
            <h2>${day.theme}</h2>
            <div class="day-focus">${day.focus}</div>
          </div>
          <div class="day-kanji">${WEEK_KANJIS[day.week]}</div>
        </div>
        <div class="exercises-list">${exRows}</div>
        <div class="completion-bar ${allDone ? 'visible' : ''}" id="cb-${i}">
          <div class="cb-icon">🌿</div>
          <div class="cb-text">Day ${dayNum} complete. Well done.</div>
          ${dayNum < 28 ? `<button class="cb-next" onclick="goDay(1)">Day ${dayNum+1} →</button>` : ''}
        </div>`;
    }

    container.appendChild(page);

    // Dot
    const dot = document.createElement("div");
    dot.className = "w-dot" + (day.rest ? " rest-dot" : "");
    dot.title = `Day ${dayNum}`;
    dot.onclick = () => showDay(i);
    dot.id = `dot-${i}`;
    strip.appendChild(dot);
  });
}

// ── TOGGLE EXERCISE ────────────────────────────────────────────────────
function toggleEx(dayIdx, exIdx, el) {
  const key = `${dayIdx}-${exIdx}`;
  checked[key] = !checked[key];
  localStorage.setItem("taichi_checked", JSON.stringify(checked));

  el.classList.toggle("done", checked[key]);
  el.querySelector(".ex-check").textContent = checked[key] ? "✓" : "";

  // Check if all done
  const day = DAYS[dayIdx];
  const allDone = day.exercises.every((_,ei) => checked[`${dayIdx}-${ei}`]);
  const cb = document.getElementById(`cb-${dayIdx}`);
  if (cb) cb.classList.toggle("visible", allDone);
}

// ── NAVIGATION ────────────────────────────────────────────────────────
function showDay(idx) {
  document.querySelectorAll(".day-page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".w-dot").forEach(d => d.classList.remove("current"));

  document.getElementById(`day-${idx}`).classList.add("active");
  document.getElementById(`dot-${idx}`).classList.add("current");

  // Update completed dots
  DAYS.forEach((d, i) => {
    const dot = document.getElementById(`dot-${i}`);
    if (i === idx) return;
    if (d.rest) { dot.classList.toggle("completed", true); return; }
    const allDone = d.exercises.every((_,ei) => checked[`${i}-${ei}`]);
    dot.classList.toggle("completed", allDone);
  });

  currentDay = idx;
  document.getElementById("day-counter").textContent = `Day ${idx+1} / 28`;
  document.getElementById("nav-day-name").textContent =
    DAYS[idx].rest ? (DAYS[idx].complete ? "Complete!" : "Rest Day") : DAYS[idx].theme;
  document.getElementById("btn-prev").disabled = idx === 0;
  document.getElementById("btn-next").disabled = idx === 27;
  document.getElementById("progress-bar").style.width = `${((idx+1)/28)*100}%`;

  window.scrollTo({ top: 0, behavior: "smooth" });
}

function goDay(dir) {
  const next = currentDay + dir;
  if (next >= 0 && next < 28) showDay(next);
}

// Keyboard navigation
document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") goDay(1);
  if (e.key === "ArrowLeft")  goDay(-1);
});

// ── INIT ──────────────────────────────────────────────────────────────
buildPages();

// Find first incomplete day
let startDay = 0;
for (let i = 0; i < DAYS.length; i++) {
  if (DAYS[i].rest) continue;
  const allDone = DAYS[i].exercises.every((_,ei) => checked[`${i}-${ei}`]);
  if (!allDone) { startDay = i; break; }
}

showDay(startDay);
</script>
